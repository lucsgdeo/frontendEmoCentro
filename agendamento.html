<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConectaDoa</title>
    <link rel="icon" href="images/image.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header id="main-header"></header>

    <main id="app">
        <section id="agendamento-section">
            <h2 style="text-align: center; color: var(--primary-color); margin-bottom: 2rem;">Agende sua Doação</h2>
            
            <div id="auth-check" style="display: none; text-align: center; padding: 2rem;">
                <p>Você precisa estar logado para agendar uma doação.</p>
                <a href="login.html" class="button" style="display: inline-block; margin-top: 1rem; text-decoration: none; background: var(--primary-color); color: white; padding: 0.8rem 1.5rem; border-radius: 4px;">Ir para Login</a>
            </div>

            <div id="booking-form-container" class="auth-container" style="max-width: 600px;">
                <form id="agendamento-form">
                    <div class="form-group">
                        <label for="data">Data:</label>
                        <input type="date" id="data" name="data" required>
                    </div>

                    <div class="form-group">
                        <label for="horario">Horário:</label>
                        <select id="horario" required>
                            <option value="">Selecione um horário...</option>
                            <option value="08:00">08:00</option>
                            <option value="09:00">09:00</option>
                            <option value="10:00">10:00</option>
                            <option value="11:00">11:00</option>
                            <option value="13:00">13:00</option>
                            <option value="14:00">14:00</option>
                            <option value="15:00">15:00</option>
                        </select>
                    </div>

                    <button type="submit" style="width: 100%;">Confirmar Agendamento</button>
                    <p id="booking-msg" style="margin-top: 1rem; text-align: center;"></p>
                </form>
            </div>
        </section>
    </main>

    <footer id="main-footer"></footer>

    <script src="js/shared.js"></script>
    <script src="js/agendamento.js"></script>
</body>
</html>
