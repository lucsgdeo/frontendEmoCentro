<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hemocentros - ConectaSangue ABC</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header id="main-header"></header>

    <main id="app">
        <section id="map-section">
            <h2 style="margin-bottom: 1rem; color: var(--primary-color);">Mapa Interativo de Hemocentros</h2>
            <div id="map" style="height: 400px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);"></div>
        </section>

        <section id="results">
            <h2 style="margin-top: 2rem; color: var(--primary-color);">Hemocentros na Região</h2>
            <div id="hemocentros-list" class="cards-container">
                <!-- Cards serão injetados via JS -->
            </div>
        </section>

        <!-- Formulário de Cadastro (Apenas para Admin/Logado) -->
        <section id="admin-section" style="display: none; margin-top: 4rem; background: white; padding: 2.5rem; border-radius: 12px; box-shadow: var(--shadow);">
            <h2 style="margin-bottom: 1.5rem; color: var(--primary-color);">Cadastrar Novo Hemocentro</h2>
            <form id="form-cadastro-hemocentro">
                <div class="form-group">
                    <label for="nome">Nome do Hemocentro</label>
                    <input type="text" id="nome" required placeholder="Ex: Hemocentro Regional">
                </div>
                <div class="form-group">
                    <label for="endereco">Endereço Completo</label>
                    <input type="text" id="endereco" required placeholder="Rua, Número, Bairro, Cidade - UF">
                </div>
                <div class="form-group">
                    <label for="telefone">Telefone</label>
                    <input type="text" id="telefone" required placeholder="(11) 0000-0000">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="lat">Latitude</label>
                        <input type="number" id="lat" step="any" required placeholder="-23.69">
                    </div>
                    <div class="form-group">
                        <label for="lng">Longitude</label>
                        <input type="number" id="lng" step="any" required placeholder="-46.61">
                    </div>
                </div>
                <button type="submit" style="width: 100%; margin-top: 1rem;">Salvar Hemocentro</button>
            </form>
        </section>
    </main>

    <footer id="main-footer"></footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="js/shared.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
