<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Agendamentos - ConectaSangue ABC</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header id="main-header"></header>

    <main id="app">
        <section id="meus-agendamentos">
            <h1 style="color: var(--primary-color); margin-bottom: 2rem;">Meus Agendamentos</h1>
            
            <div id="agendamentos-list" class="cards-container">
                <!-- Agendamentos serão injetados via JS -->
                <p>Carregando seus agendamentos...</p>
            </div>
        </section>

        <!-- Modal de Reagendamento -->
        <div id="reagendar-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
            <div style="background: white; padding: 2rem; border-radius: 12px; width: 90%; max-width: 400px; box-shadow: var(--shadow);">
                <h2 style="color: var(--primary-color); margin-bottom: 1.5rem;">Reagendar Doação</h2>
                <form id="form-reagendar">
                    <input type="hidden" id="reagendar-id">
                    <div class="form-group">
                        <label for="nova-data">Nova Data</label>
                        <input type="date" id="nova-data" required>
                    </div>
                    <div class="form-group">
                        <label for="novo-horario">Novo Horário</label>
                        <select id="novo-horario" required>
                            <option value="">Selecione um horário</option>
                            <option value="08:00">08:00</option>
                            <option value="09:00">09:00</option>
                            <option value="10:00">10:00</option>
                            <option value="11:00">11:00</option>
                            <option value="13:00">13:00</option>
                            <option value="14:00">14:00</option>
                            <option value="15:00">15:00</option>
                            <option value="16:00">16:00</option>
                        </select>
                    </div>
                    <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                        <button type="submit" style="flex: 1;">Confirmar</button>
                        <button type="button" id="cancelar-modal" style="flex: 1; background-color: #777;">Voltar</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer id="main-footer"></footer>

    <script src="js/shared.js"></script>
    <script src="js/agendamentos.js"></script>
</body>
</html>
